<title>THE ANTHROPIC EXPERIENCE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ============ FONTS (embedded; no external requests) ============ */
@font-face{font-family:'Rye';font-style:normal;font-weight:400;font-display:swap;src:url({{RYE_URI}}) format('woff2')}
@font-face{font-family:'Oswald';font-style:normal;font-weight:300 600;font-display:swap;src:url({{OSWALD_URI}}) format('woff2')}

/* ============ TOKENS — one committed visual world: the tent at night ============ */
:root{
  --night:#16100f; --tent:#20141a; --velvet:#421019; --oxblood:#6d1a24; --aub:#3a2233;
  --brass:#c9973f; --brass-hi:#e0b45e; --brass-dim:#8a6a33; --mustard:#c2a24e;
  --cream:#efe3c8; --paper:#e9dcbd; --paper-deep:#d9c69c; --ink:#2b1d18; --ink-soft:#4a382e;
  --teal:#6fa39a; --teal-deep:#4e7d76;
  --f-code:#c9973f; --f-chat:#6fa39a; --f-projects:#cdad55; --f-cowork:#cf7a63;
  --f-extensions:#a58bbf; --f-developer:#94a56e; --f-cloud:#8ba3c2;
  --display:'Rye', 'Georgia', serif;
  --sans:'Oswald', 'Arial Narrow', system-ui, sans-serif;
  --mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace;
  --maxw:1120px;
}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{background:var(--night);color:var(--cream);font-family:var(--sans);font-weight:300;
  font-size:17px;line-height:1.6;letter-spacing:.01em;margin:0;overflow-x:hidden}
::selection{background:var(--brass);color:var(--ink)}

/* ============ TYPE ROLES ============ */
h1,h2,.display{font-family:var(--display);font-weight:400;letter-spacing:.02em;text-wrap:balance}
h3,h4{font-family:var(--sans);font-weight:500;letter-spacing:.06em;text-transform:uppercase;text-wrap:balance}
.mono, code, .ledger{font-family:var(--mono);font-size:.82em;letter-spacing:0}
.eyebrow{font-family:var(--sans);font-weight:500;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--brass)}
p{max-width:62ch}
a{color:var(--brass-hi)}
a:hover{color:var(--cream)}

/* ============ FOCUS / A11Y ============ */
:focus-visible{outline:3px solid var(--brass-hi);outline-offset:2px;border-radius:2px}
.skip{position:absolute;left:-999px;top:0;background:var(--brass);color:var(--ink);padding:.6rem 1rem;z-index:99;font-weight:500}
.skip:focus{left:8px;top:8px}
.visually-hidden{position:absolute!important;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

/* ============ MARQUEE / HERO ============ */
.hero{position:relative;min-height:78vh;display:flex;align-items:flex-end;justify-content:center;
  border-bottom:6px double var(--brass-dim)}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%}
.hero-veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(22,16,15,.28) 0%,rgba(22,16,15,.08) 34%,rgba(22,16,15,.62) 74%,rgba(22,16,15,.94) 100%)}
.hero-inner{position:relative;text-align:center;padding:9rem 1.2rem 3.4rem;max-width:900px}
.hero .eyebrow{background:rgba(22,16,15,.62);padding:.34rem .8rem;border-radius:2px;display:inline-block}
.hero h1{font-size:clamp(2.1rem,7.2vw,4.6rem);line-height:1.04;margin:.4rem 0 .9rem;color:var(--cream);
  text-shadow:0 2px 0 rgba(0,0,0,.55),0 0 34px rgba(201,151,63,.28)}
.hero .sub{font-family:var(--sans);font-weight:400;font-size:clamp(1rem,2.4vw,1.35rem);letter-spacing:.14em;
  text-transform:uppercase;color:var(--brass-hi);margin:0 0 1.1rem;text-shadow:0 1px 0 rgba(0,0,0,.6)}
.hero .thesis{margin:0 auto 1.4rem;color:#e5d5b4;font-size:1.02rem;max-width:56ch;text-shadow:0 1px 0 rgba(0,0,0,.6)}
.chiprow{display:flex;gap:.55rem;justify-content:center;flex-wrap:wrap}
.chip{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  border:1px solid var(--brass-dim);color:var(--brass-hi);padding:.34rem .7rem;border-radius:2px;background:rgba(22,16,15,.55)}

/* ============ SECTION SCAFFOLD ============ */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 1.2rem}
section.band{padding:4.2rem 0 4.6rem}
.band-head{max-width:var(--maxw);margin:0 auto 2rem;padding:0 1.2rem}
.band-head h2{font-size:clamp(1.5rem,3.6vw,2.4rem);color:var(--brass-hi);margin:.35rem 0 .6rem}
.band-head .lede{color:#d9c8a6}
.rule{border:none;border-top:3px double var(--brass-dim);margin:0}

/* ============ EVIDENCE BADGES (never color-alone: text is the label) ============ */
.badge{display:inline-block;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;font-weight:600;
  padding:.14rem .5rem .12rem;border-radius:2px;border:1px solid;vertical-align:middle;text-transform:uppercase}
.badge-receipt{color:#9fd6a8;border-color:#3e6b46;background:#152317}
.badge-transcript{color:#a8c6e2;border-color:#3d5a75;background:#131c26}
.badge-official-source{color:#d5c08e;border-color:#77693c;background:#221c10}
.badge-user-observed{color:#dbb1a4;border-color:#7c4a3c;background:#241512}
.badge-analysis{color:#c9b3dd;border-color:#5f4a78;background:#1b1424}
.badge-unknown{color:#b9b2a5;border-color:#5c564b;background:#1d1b16}
.badge-satire{color:#e0a5c0;border-color:#7a4059;background:#241219}

/* ============ TICKETS / DIRECTORY ============ */
.stage-wrap{position:relative;margin:0 auto;max-width:1180px}
.stage-img{width:100%;height:auto;display:block;border:1px solid #000;box-shadow:0 0 60px rgba(0,0,0,.6) inset}
.wheel-overlay{position:absolute;left:50%;top:44.5%;transform:translate(-50%,-50%);width:31.5%;aspect-ratio:1}
.wheel-overlay svg{width:100%;height:100%;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,.55))}
.wheel-controls{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin:1.4rem 0 0}
.wedge{cursor:pointer}
.wedge:focus-visible{outline:none}
.wedge:focus-visible .wedge-shape{stroke:var(--brass-hi);stroke-width:3}
.wedge[aria-pressed="true"] .wedge-shape{stroke:#fff;stroke-width:2.5}
.wedge-num{font-family:var(--sans);font-weight:500;fill:var(--ink);font-size:11.5px;pointer-events:none}
.hub-text{font-family:var(--display);fill:var(--ink);font-size:13px}
.btn{font-family:var(--sans);font-weight:500;letter-spacing:.12em;text-transform:uppercase;font-size:.8rem;
  background:linear-gradient(180deg,var(--brass-hi),var(--brass));color:var(--ink);border:1px solid #5e4517;
  border-radius:3px;padding:.7rem 1.25rem;cursor:pointer;box-shadow:0 3px 0 #5e4517}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #5e4517}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn-quiet{background:transparent;color:var(--brass-hi);border:1px solid var(--brass-dim);box-shadow:none}
.btn-quiet:hover{background:rgba(201,151,63,.1)}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin:2.2rem 0 1.1rem}
.filter-chip{font-family:var(--sans);font-weight:400;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  background:transparent;color:var(--cream);border:1px solid #5c4a3a;border-radius:20px;padding:.38rem .9rem;cursor:pointer}
.filter-chip[aria-pressed="true"]{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:500}
.search{font-family:var(--sans);font-weight:300;background:#241a16;color:var(--cream);border:1px solid #5c4a3a;
  border-radius:3px;padding:.5rem .8rem;font-size:.95rem;min-width:210px}
.search::placeholder{color:#8d7c66}
.tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:.75rem;margin-top:1rem}
.ticket{position:relative;text-align:left;background:linear-gradient(175deg,var(--paper) 0%,var(--paper-deep) 100%);
  color:var(--ink);border:1px solid #8a744c;border-radius:3px;padding:.72rem .85rem .66rem 1.15rem;cursor:pointer;
  font-family:var(--sans);box-shadow:0 2px 0 rgba(0,0,0,.5)}
.ticket::before{content:"";position:absolute;left:.42rem;top:.5rem;bottom:.5rem;width:3px;background:var(--fc,#888);border-radius:2px}
.ticket:hover{filter:brightness(1.05)}
.ticket[aria-pressed="true"]{outline:3px solid var(--brass-hi);outline-offset:1px}
.ticket .tnum{font-family:var(--mono);font-size:.66rem;color:#6d5a3d;letter-spacing:.08em}
.ticket .tname{font-weight:500;font-size:1.0rem;line-height:1.25;letter-spacing:.02em}
.ticket .tdetail{font-weight:300;font-size:.8rem;color:var(--ink-soft)}
.ticket .tfam{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:#6d5a3d;margin-top:.28rem}

/* ============ PASSPORT ============ */
.passport{background:linear-gradient(178deg,var(--paper),var(--paper-deep));color:var(--ink);border:1px solid #8a744c;
  border-radius:4px;max-width:820px;margin:2.4rem auto 0;padding:1.6rem 1.7rem;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.passport .eyebrow{color:#7c5c22}
.passport h3{color:var(--ink);margin:.2rem 0 .3rem;font-size:1.35rem}
.passport .pdetail{color:var(--ink-soft);font-weight:300}
.passport table{width:100%;border-collapse:collapse;margin:.9rem 0 .4rem;font-size:.9rem}
.passport td{padding:.34rem .4rem;border-top:1px dashed #a98;vertical-align:top}
.passport td:first-child{font-weight:500;letter-spacing:.04em;width:42%}
.passport .empty-state{border:2px dashed #a98;border-radius:3px;padding:1rem 1.1rem;margin-top:.9rem;
  font-weight:300;color:var(--ink-soft)}
.admit{display:inline-block;margin-top:1rem;background:var(--oxblood);color:var(--cream);border:2px solid var(--brass);
  font-family:var(--display);letter-spacing:.1em;font-size:1.05rem;padding:.8rem 1.6rem;border-radius:3px;cursor:pointer;
  box-shadow:0 4px 0 #3d0e14}
.admit:hover{background:#7e2230}
.admit:active{transform:translateY(2px);box-shadow:0 2px 0 #3d0e14}

/* ============ ACTS ============ */
.act{border-top:3px double var(--brass-dim);padding:3.6rem 0 4rem}
.act-label{font-family:var(--mono);color:var(--brass);font-size:.72rem;letter-spacing:.3em;text-transform:uppercase}
.act h2{font-size:clamp(1.45rem,3.4vw,2.3rem);color:var(--cream);margin:.4rem 0 .9rem}
.scene{margin:1.4rem 0;position:relative}
.scene img{width:100%;height:auto;display:block;border:1px solid #000;border-radius:2px;box-shadow:0 12px 44px rgba(0,0,0,.55)}
.scene figcaption{font-size:.74rem;color:#a8977c;letter-spacing:.06em;margin-top:.5rem;font-family:var(--mono)}
.placard{background:linear-gradient(178deg,var(--paper),var(--paper-deep));color:var(--ink);border-radius:3px;
  border:1px solid #8a744c;padding:1.35rem 1.5rem;margin:1.3rem 0;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.placard h3{color:var(--ink);font-size:1.05rem;margin:0 0 .5rem}
.placard p{color:var(--ink-soft);font-weight:300;margin:.4rem 0}
.headline-line{font-family:var(--display);font-size:clamp(1.05rem,2.6vw,1.5rem);color:var(--oxblood);line-height:1.3;margin:.2rem 0 .6rem}
table.ledger{width:100%;border-collapse:collapse;background:#f4ecd7;color:var(--ink);font-size:.86rem;border:1px solid #8a744c}
table.ledger th{font-family:var(--sans);font-weight:500;text-transform:uppercase;letter-spacing:.1em;font-size:.68rem;
  text-align:left;padding:.55rem .65rem;background:#e4d6b2;border-bottom:2px solid #8a744c}
table.ledger td{padding:.5rem .65rem;border-top:1px solid #cbb98e;vertical-align:top}
table.ledger tr:nth-child(even) td{background:#eee3c6}
.tablewrap{overflow-x:auto;border-radius:3px;margin:1rem 0}
.ra .ra-prose{color:var(--text-body);font-family:var(--font-sans);font-size:15px;line-height:1.7;max-width:76ch;border-top:1px solid var(--border-subtle);padding-top:8px}
.ra .ra-prose h1,.ra .ra-prose h2,.ra .ra-prose h3,.ra .ra-prose h4{color:var(--text-strong);font-weight:600;letter-spacing:-.01em;line-height:1.3;margin:30px 0 10px}
.ra .ra-prose h1{font-size:23px}
.ra .ra-prose h2{font-size:19px;padding-top:16px;border-top:1px solid var(--border-subtle)}
.ra .ra-prose h3{font-size:16px}
.ra .ra-prose p{margin:0 0 14px}
.ra .ra-prose ul,.ra .ra-prose ol{margin:0 0 14px;padding-left:22px}
.ra .ra-prose li{margin:5px 0}
.ra .ra-prose strong{color:var(--text-strong);font-weight:600}
.ra .ra-prose code{font-family:var(--font-mono);font-size:.85em;background:var(--surface-muted);padding:1px 5px;border-radius:4px;border:1px solid var(--border-subtle)}
.ra .ra-prose blockquote{margin:14px 0;padding:2px 16px;border-left:3px solid var(--border-strong);color:var(--text-muted)}
.ra .ra-prose table{width:100%;border-collapse:collapse;font-size:13px;margin:16px 0;display:block;overflow-x:auto}
.ra .ra-prose th,.ra .ra-prose td{border:1px solid var(--border-default);padding:7px 10px;text-align:left;vertical-align:top}
.ra .ra-prose th{background:var(--surface-muted);font-weight:600;color:var(--text-strong)}
.ra .ra-prose a{color:var(--text-strong);text-decoration:underline;text-underline-offset:2px}
.ra .ra-prose hr{border:none;border-top:1px solid var(--border-subtle);margin:22px 0}
.qblock{border-left:4px solid var(--brass);background:#241a16;padding:.9rem 1.1rem;margin:1rem 0;color:#e2d2b2;font-weight:300}
.qblock .mono{color:#cbbb9a}
.turnref{font-family:var(--mono);font-size:.66rem;color:#a8977c;letter-spacing:.04em}

/* backstage drawers */
.drawer{margin:1.2rem 0 0}
.drawer-btn{width:100%;text-align:left;background:#1d1512;color:var(--brass-hi);border:1px solid #4c3b28;border-radius:3px;
  font-family:var(--mono);font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;padding:.75rem 1rem;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:1rem}
.drawer-btn:hover{background:#241a15}
.drawer-btn .caret{transition:transform .2s}
.drawer-btn[aria-expanded="true"] .caret{transform:rotate(90deg)}
.drawer-panel{border:1px solid #4c3b28;border-top:none;border-radius:0 0 3px 3px;background:#151011;padding:1.1rem 1.2rem;color:#d9cbb0}
.drawer-panel .row{padding:.55rem 0;border-top:1px dashed #3c2f24}
.drawer-panel .row:first-child{border-top:none}
.drawer-panel .mono{color:#bfae8e}
@media(prefers-reduced-motion:reduce){.drawer-btn .caret{transition:none}}

/* counter */
.counter{display:inline-flex;align-items:center;gap:.6rem;background:#101010;border:2px solid var(--brass-dim);
  border-radius:4px;padding:.5rem .9rem;font-family:var(--mono)}
.counter .digits{background:#000;color:#ffd67e;font-size:1.5rem;letter-spacing:.24em;padding:.15rem .5rem .1rem;
  border-radius:2px;border:1px solid #333;font-variant-numeric:tabular-nums;min-width:3.2ch;text-align:right}
.counter .clabel{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass)}

/* stepper */
.step-view{background:#1b1310;border:1px solid #4c3b28;border-radius:3px;padding:1.2rem 1.3rem;min-height:9.5rem}
.step-actor{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase}
.actor-operator{color:#e8b48d}.actor-claude{color:#a8c6e2}.actor-receipt{color:#9fd6a8}
.step-label{font-family:var(--display);font-size:1.2rem;color:var(--cream);margin:.3rem 0 .4rem}
.step-detail{color:#d3c3a4;font-weight:300;max-width:64ch}
.step-quote{border-left:3px solid var(--brass-dim);padding:.4rem .8rem;margin:.6rem 0 0;font-style:italic;color:#cbbb9a}
.step-nav{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;margin-top:1rem}
.step-count{font-family:var(--mono);font-size:.72rem;color:#a8977c}
.intervene-flash{color:#ffd67e;font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase}

/* stat tiles / scoreboard */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:.7rem;margin:1.2rem 0}
.stat{background:#f4ecd7;color:var(--ink);border:1px solid #8a744c;border-radius:3px;padding:.85rem 1rem .7rem}
.stat .k{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#6d5a3d;font-weight:500}
.stat .v{font-family:var(--mono);font-size:1.02rem;margin:.3rem 0 .25rem;font-variant-numeric:tabular-nums;line-height:1.35}
.stat .src{font-size:.62rem;color:#8a744c;font-family:var(--mono)}
.bignum .v{font-size:1.7rem}

/* rings */
.rings{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.9rem;margin:1.2rem 0}
.ring{border:3px double var(--brass-dim);border-radius:6px;background:#1b1310;padding:1rem 1.1rem}
.ring h4{color:var(--brass-hi);margin:0 0 .4rem;font-size:.86rem}
.ring p{font-weight:300;color:#d3c3a4;font-size:.92rem}

/* model interlude */
.interlude{background:var(--velvet);border-top:3px double var(--brass-dim);border-bottom:3px double var(--brass-dim);
  padding:2.6rem 0;text-align:center}
.model-badge{display:inline-block;font-family:var(--mono);font-size:.9rem;background:#160b0d;color:#ffd67e;
  border:1px solid var(--brass-dim);border-radius:3px;padding:.5rem 1rem;letter-spacing:.06em;min-width:16ch}

/* poem + finale */
.poem{font-family:var(--display);font-size:clamp(1.02rem,2.4vw,1.4rem);line-height:1.75;color:var(--cream);max-width:34ch;margin:1.6rem auto;text-align:center}
.ledger-sync{max-width:520px;margin:1.6rem auto;background:#101010;border:2px solid var(--brass-dim);border-radius:4px;
  padding:1.1rem 1.3rem;font-family:var(--mono);font-size:.86rem;color:#e2d2b2}
.ledger-sync .row{display:flex;justify-content:space-between;padding:.3rem 0;border-top:1px dashed #3a2f24}
.ledger-sync .row:first-child{border-top:none}

/* research wing — sober paper world */
.research{background:linear-gradient(180deg,#e9dcbd,#ddc9a1);color:var(--ink);padding:4.4rem 0 5rem}
.research h2{color:#571620}
.research h3{color:var(--ink)}
.research p{color:var(--ink-soft)}
.research .card{background:#f4ecd7;border:1px solid #8a744c;border-radius:3px;padding:1.2rem 1.35rem;margin:.9rem 0;box-shadow:0 3px 10px rgba(43,29,24,.12)}
.research .card h4{margin:0 0 .45rem;color:#571620}
.research .anchor{font-family:var(--mono);font-size:.64rem;color:#8a744c}
.gapgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.9rem}
.chainline{font-family:var(--mono);font-size:.9rem;background:#f4ecd7;border:1px dashed #8a744c;padding:.9rem 1.1rem;border-radius:3px;overflow-x:auto;white-space:pre}
.ladder{font-family:var(--display);font-size:clamp(1rem,2.2vw,1.3rem);color:#571620;line-height:1.8}

/* transcript */
.transcript-body{background:#f4ecd7;color:var(--ink);border:1px solid #8a744c;border-radius:3px;padding:1.6rem 1.8rem;
  max-height:72vh;overflow:auto;font-family:Georgia,serif;font-size:.93rem;line-height:1.65}
.transcript-body h1,.transcript-body h2,.transcript-body h3{font-family:var(--sans);color:#571620;letter-spacing:.02em;text-transform:none}
.transcript-body blockquote{border-left:3px solid #8a744c;margin:.8rem 0;padding:.2rem .9rem;color:#57493d}
.transcript-body table{border-collapse:collapse;font-size:.82rem;width:100%;overflow-x:auto;display:block}
.transcript-body td,.transcript-body th{border:1px solid #b8a67e;padding:.35rem .5rem;text-align:left}
.transcript-body code{background:#e4d6b2;padding:.05rem .3rem;border-radius:2px;font-size:.85em}
.fidelity{border:2px solid #7c4a3c;background:#241512;color:#dbb1a4;border-radius:3px;padding:.9rem 1.1rem;font-size:.86rem;max-width:75ch}

/* footer */
footer{border-top:6px double var(--brass-dim);padding:3rem 0 4rem;color:#b3a184;font-size:.85rem;font-weight:300}
footer h4{color:var(--brass)}
footer .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.6rem}

/* toast */
.toast{position:fixed;left:50%;bottom:1.4rem;transform:translateX(-50%);background:var(--paper);color:var(--ink);
  border:2px solid var(--brass);border-radius:3px;padding:.8rem 1.2rem;font-family:var(--sans);font-weight:400;
  box-shadow:0 10px 30px rgba(0,0,0,.6);z-index:60;max-width:92vw;text-align:center}
.toast[hidden]{display:none}

/* motion */
@keyframes bulb{0%,100%{opacity:.85}50%{opacity:1}}
.spin-anim{transition:transform 3.4s cubic-bezier(.17,.67,.16,1)}

/* ════════════════════════════════════════════════════════════════
   RESEARCH ARCHIVE — the operator's design system (handoff bundle),
   scoped to .ra. Tokens are verbatim from tokens/*.css; fonts embedded
   locally (the bundle's Google-Fonts @import is blocked by artifact CSP);
   icons are inline Solar glyphs (tool log uses solar:sledgehammer-linear —
   solar:wrench-linear does not exist in the Solar set).
   ════════════════════════════════════════════════════════════════ */
@font-face{font-family:'Inter';font-style:normal;font-weight:400 700;font-display:swap;src:url({{INTER_URI}}) format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400 600;font-display:swap;src:url({{JBMONO_URI}}) format('woff2')}
.ra{
  /* zinc spine */
  --zinc-50:#fafafa;--zinc-100:#f4f4f5;--zinc-200:#e4e4e7;--zinc-300:#d4d4d8;--zinc-400:#a1a1aa;
  --zinc-500:#71717a;--zinc-600:#52525b;--zinc-700:#3f3f46;--zinc-800:#27272a;--zinc-900:#18181b;
  --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;--blue-400:#60a5fa;--blue-500:#3b82f6;--blue-700:#1d4ed8;--blue-900:#1e3a8a;
  --emerald-500:#10b981;--red-50:#fef2f2;--red-500:#ef4444;--red-900:#7f1d1d;
  --surface-page:var(--zinc-50);--surface-card:#fff;--surface-muted:var(--zinc-100);--surface-inverse:var(--zinc-900);
  --text-strong:var(--zinc-900);--text-body:var(--zinc-800);--text-muted:var(--zinc-700);--text-subtle:var(--zinc-500);--text-faint:var(--zinc-400);
  --border-strong:var(--zinc-300);--border-default:var(--zinc-200);--border-subtle:var(--zinc-100);
  --info-surface:color-mix(in srgb,var(--blue-50) 50%,#fff);--info-border:var(--blue-100);--info-accent:var(--blue-400);
  --info-icon:var(--blue-500);--info-text:var(--blue-900);--info-tag-text:var(--blue-700);--info-tag-bg:var(--blue-50);--info-tag-border:var(--blue-200);
  --alert-accent:var(--red-500);--alert-text:var(--red-900);--alert-surface:var(--red-50);
  --font-sans:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --radius-md:6px;--radius-lg:8px;--radius-xl:12px;--radius-full:9999px;
  --shadow-xs:0 1px 2px 0 rgb(0 0 0/.05);--shadow-sm:0 1px 3px 0 rgb(0 0 0/.10),0 1px 2px -1px rgb(0 0 0/.10);
  --content-max:56rem;
  background:var(--surface-page);color:var(--text-body);
  font-family:var(--font-sans);font-weight:400;font-size:15px;line-height:1.55;letter-spacing:0;
}
.ra ::selection{background:var(--zinc-200);color:var(--zinc-900)}
.ra .wrap{max-width:var(--content-max)}
.ra h2,.ra h3,.ra h4{font-family:var(--font-sans);color:var(--text-strong);text-transform:none;letter-spacing:-0.015em}
.ra h2{font-weight:600;font-size:24px;line-height:1.2;margin:0 0 .5rem}
.ra h3{font-weight:600;font-size:20px;line-height:1.4;margin:1.2rem 0 .5rem}
.ra h4{font-weight:600;font-size:15px;margin:0 0 .35rem}
.ra p{color:var(--text-body);max-width:none}
.ra a{color:var(--info-tag-text)}
.ra .ra-title{font-weight:600;font-size:clamp(30px,4.5vw,36px);line-height:1.2;letter-spacing:-0.03em;color:var(--text-strong);margin:.2rem 0 .4rem}
.ra .ra-micro{font-family:var(--font-sans);font-weight:500;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-subtle)}
.ra .mono, .ra code{font-family:var(--font-mono);font-size:12px;letter-spacing:0}
.ra .ra-chip{font-family:var(--font-mono);font-size:12px;background:var(--surface-muted);border:1px solid var(--border-default);
  border-radius:var(--radius-md);padding:.1rem .38rem;color:var(--text-muted);white-space:nowrap}
.ra .ra-band{padding:64px 0}
.ra .ra-rule{border:none;border-top:1px solid var(--border-default);margin:64px 0}
/* document header */
.ra .ra-doc-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.ra .ra-monogram{width:40px;height:40px;border-radius:8px;background:var(--surface-inverse);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-sans);font-weight:600;font-size:15px;letter-spacing:-.015em;flex:none}
.ra .ra-wordmark{font-weight:600;color:var(--text-strong);letter-spacing:-.015em}
/* metadata grid */
.ra .ra-metagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));border:1px solid var(--border-default);
  border-radius:var(--radius-xl);overflow:hidden;background:var(--border-default);gap:1px;box-shadow:var(--shadow-xs)}
.ra .ra-metacell{background:var(--surface-card);padding:12px 16px}
.ra .ra-metacell .k{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-subtle)}
.ra .ra-metacell .v{font-size:14px;color:var(--text-strong);margin-top:2px}
.ra .ra-metacell .v.mono{font-size:12px}
/* callouts */
.ra .ra-callout{display:flex;gap:12px;border:1px solid var(--info-border);border-left:4px solid var(--info-accent);
  background:var(--info-surface);border-radius:var(--radius-xl);padding:16px 20px;color:var(--info-text);font-size:14px;line-height:1.55}
.ra .ra-callout .ico{width:20px;height:20px;flex:none;color:var(--info-icon);margin-top:1px}
.ra .ra-callout.alert{border-color:#fecaca;border-left-color:var(--alert-accent);background:var(--alert-surface);color:var(--alert-text)}
.ra .ra-callout.alert .ico{color:var(--alert-accent)}
.ra .ra-callout strong{font-weight:600}
.ra .ico svg{width:100%;height:100%;display:block}
/* tables */
.ra table.ra-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border-default);
  border-radius:var(--radius-xl);overflow:hidden;background:var(--surface-card);font-size:14px;box-shadow:var(--shadow-xs)}
.ra table.ra-table th{background:var(--zinc-50);font-weight:500;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-subtle);text-align:left;padding:10px 16px;border-bottom:1px solid var(--border-default)}
.ra table.ra-table td{padding:12px 16px;border-bottom:1px solid var(--border-subtle);color:var(--text-muted);vertical-align:top}
.ra table.ra-table tr:last-child td{border-bottom:none}
.ra table.ra-table tr:nth-child(even) td{background:color-mix(in srgb,var(--zinc-50) 50%,#fff)}
/* cards */
.ra .ra-card{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-xl);
  padding:24px;box-shadow:var(--shadow-xs)}
.ra .ra-card.muted{background:var(--zinc-50)}
/* badges */
.ra .ra-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;letter-spacing:.02em;
  border-radius:var(--radius-full);padding:2px 9px;border:1px solid var(--border-default);background:var(--surface-card);color:var(--text-muted)}
.ra .ra-badge.info{border-color:var(--info-tag-border);background:var(--info-tag-bg);color:var(--info-tag-text)}
.ra .ra-badge.ok::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--emerald-500)}
.ra .ra-badge.alert{border-color:#fecaca;background:var(--alert-surface);color:var(--alert-text)}
.ra .ra-badge.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:0}
/* evidence badges recolored inside RA */
.ra .badge{font-family:var(--font-mono);font-size:10px;border-radius:var(--radius-md);letter-spacing:.08em}
.ra .badge-receipt{color:#047857;border-color:#a7f3d0;background:#ecfdf5}
.ra .badge-transcript{color:var(--info-tag-text);border-color:var(--info-tag-border);background:var(--info-tag-bg)}
.ra .badge-user-observed{color:#9a3412;border-color:#fed7aa;background:#fff7ed}
.ra .badge-analysis{color:#6d28d9;border-color:#ddd6fe;background:#f5f3ff}
.ra .badge-unknown{color:var(--text-subtle);border-color:var(--border-default);background:var(--surface-muted)}
.ra .badge-official-source{color:#854d0e;border-color:#fde68a;background:#fefce8}
.ra .badge-satire{color:#9d174d;border-color:#fbcfe8;background:#fdf2f8}
/* transcript turns */
.ra .ra-turn{display:flex;gap:24px;margin:48px 0}
.ra .ra-avatar{flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.ra .ra-avatar.human{border-radius:50%;background:var(--surface-card);border:1px solid var(--border-strong);color:var(--text-subtle);box-shadow:var(--shadow-sm)}
.ra .ra-avatar.agent{border-radius:8px;background:var(--surface-inverse);color:#fff;box-shadow:var(--shadow-sm)}
.ra .ra-avatar .ico{width:20px;height:20px}
.ra .ra-turn-body{flex:1;min-width:0}
.ra .ra-turn-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.ra .ra-speaker{font-weight:600;font-size:14px;color:var(--text-strong)}
.ra .ra-turn-num{font-family:var(--font-mono);font-size:12px;color:var(--text-faint)}
.ra .ra-turn.human .ra-turn-text{border-left:2px solid var(--border-strong);padding:2px 0 2px 16px;color:var(--text-muted);font-style:italic}
.ra .ra-turn-text p{margin:.5em 0;font-size:15px;line-height:1.55}
.ra .ra-turn-text blockquote{border-left:2px solid var(--border-default);margin:.6em 0;padding:.1em 0 .1em 14px;color:var(--text-muted)}
.ra .ra-turn-text strong{color:var(--text-strong);font-weight:600}
.ra .ra-turn-text code{background:var(--surface-muted);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:.06rem .3rem;font-size:12px}
/* tool logs */
.ra .ra-toollog{display:flex;gap:10px;background:var(--zinc-50);border:1px solid var(--border-default);border-radius:var(--radius-lg);
  padding:10px 14px;margin:10px 0;font-family:var(--font-mono);font-size:12px;line-height:1.6;color:var(--text-muted)}
.ra .ra-toollog .ico{width:16px;height:16px;flex:none;color:var(--text-subtle);margin-top:2px}
.ra .ra-toollog.critical{background:var(--alert-surface);border-color:#fecaca;color:var(--alert-text)}
.ra .ra-toollog.critical .ico{color:var(--alert-accent)}
/* model switch divider */
.ra .ra-switch{display:flex;align-items:center;gap:16px;margin:48px 0}
.ra .ra-switch::before,.ra .ra-switch::after{content:"";flex:1;border-top:1px solid var(--border-default)}
.ra .ra-switch .cap{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-default);border-radius:var(--radius-full);
  background:var(--surface-card);box-shadow:var(--shadow-sm);padding:6px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}
.ra .ra-switch .ico{width:14px;height:14px;color:var(--text-subtle)}
/* annex strikes as alert callouts */
.ra .ra-strike{margin:16px 0}
.ra .ra-focus :focus-visible, .ra :focus-visible{outline:none;box-shadow:0 0 0 2px var(--surface-page),0 0 0 4px var(--zinc-400);border-radius:4px}
.ra .anchor{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);letter-spacing:0}
.ra .tablewrap{overflow-x:auto;margin:12px 0;border-radius:12px}
@media(max-width:700px){.ra .ra-turn{gap:12px}.ra .ra-avatar{width:32px;height:32px}}
</style>
