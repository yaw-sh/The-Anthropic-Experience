<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;width:1280px;height:854px;overflow:hidden}
  .tile{display:flex;width:1280px;height:854px;font-family:var(--font-sans)}
  .main{flex:1;background:var(--zinc-900);display:flex;align-items:center;justify-content:center;padding:0 90px}
  .name{color:#fafafa;font-weight:600;font-size:150px;line-height:0.98;letter-spacing:-0.04em}
  .name .lo{color:var(--zinc-500);display:block;font-weight:500}
  .strip{width:150px;display:flex;flex-direction:column}
  .strip>div{flex:1}
</style></head>
<body>
<div class="tile">
  <div class="main"><div class="name">Research<span class="lo">Archive</span></div></div>
  <div class="strip">
    <div style="background:var(--blue-400)"></div>
    <div style="background:var(--emerald-500)"></div>
    <div style="background:var(--red-500)"></div>
    <div style="background:var(--blue-700)"></div>
  </div>
</div>
</body></html>
