<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;align-items:flex-end;gap:16px}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--zinc-800);border-radius:2px;width:20px}
.lab{font:var(--fw-regular) 10px/1 var(--font-mono);color:var(--text-subtle)}
</style></head><body>
<div class="row">
<div class="item"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
<div class="item"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
<div class="item"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
<div class="item"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
<div class="item"><div class="bar" style="height:24px"></div><span class="lab">6·24</span></div>
<div class="item"><div class="bar" style="height:32px"></div><span class="lab">8·32</span></div>
<div class="item"><div class="bar" style="height:48px"></div><span class="lab">12·48</span></div>
<div class="item"><div class="bar" style="height:64px"></div><span class="lab">16·64</span></div>
</div>
</body></html>
