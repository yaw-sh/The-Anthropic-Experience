<!-- @dsCard group="Colors" viewport="700x150" name="Neutral · zinc scale" subtitle="The spine of the system — 10 steps from #fafafa to #18181b" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-default)}
.sw{flex:1;height:64px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
.lab{font:var(--fw-medium) 10px/1 var(--font-mono)}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--zinc-50)"><span class="lab" style="color:var(--zinc-600)">50</span></div>
<div class="sw" style="background:var(--zinc-100)"><span class="lab" style="color:var(--zinc-600)">100</span></div>
<div class="sw" style="background:var(--zinc-200)"><span class="lab" style="color:var(--zinc-600)">200</span></div>
<div class="sw" style="background:var(--zinc-300)"><span class="lab" style="color:var(--zinc-700)">300</span></div>
<div class="sw" style="background:var(--zinc-400)"><span class="lab" style="color:var(--zinc-900)">400</span></div>
<div class="sw" style="background:var(--zinc-500)"><span class="lab" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--zinc-600)"><span class="lab" style="color:#fff">600</span></div>
<div class="sw" style="background:var(--zinc-700)"><span class="lab" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--zinc-800)"><span class="lab" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--zinc-900)"><span class="lab" style="color:#fff">900</span></div>
</div>
</body></html>
