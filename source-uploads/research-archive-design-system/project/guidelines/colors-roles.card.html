<!-- @dsCard group="Colors" viewport="700x170" name="Semantic roles · surface & text" subtitle="How neutrals map to surfaces, text and borders" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.wrap{display:flex;gap:20px}
.col{flex:1}
.h{font:var(--fw-medium) 10px/1 var(--font-sans);letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--text-subtle);margin-bottom:8px}
.line{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dot{width:16px;height:16px;border-radius:4px;border:1px solid var(--border-default)}
.t{font:var(--fw-regular) 12px/1.3 var(--font-mono)}
</style></head><body>
<div class="wrap">
<div class="col"><div class="h">Surfaces</div>
<div class="line"><span class="dot" style="background:var(--surface-page)"></span><span class="t" style="color:var(--text-muted)">--surface-page</span></div>
<div class="line"><span class="dot" style="background:var(--surface-card)"></span><span class="t" style="color:var(--text-muted)">--surface-card</span></div>
<div class="line"><span class="dot" style="background:var(--surface-muted)"></span><span class="t" style="color:var(--text-muted)">--surface-muted</span></div>
<div class="line"><span class="dot" style="background:var(--surface-inverse)"></span><span class="t" style="color:var(--text-muted)">--surface-inverse</span></div>
</div>
<div class="col"><div class="h">Text</div>
<div class="line"><span class="t" style="color:var(--text-strong);font-weight:600">--text-strong</span></div>
<div class="line"><span class="t" style="color:var(--text-body)">--text-body</span></div>
<div class="line"><span class="t" style="color:var(--text-subtle)">--text-subtle</span></div>
<div class="line"><span class="t" style="color:var(--text-faint)">--text-faint</span></div>
</div>
<div class="col"><div class="h">Borders</div>
<div class="line"><span class="dot" style="background:#fff;border-color:var(--border-strong)"></span><span class="t" style="color:var(--text-muted)">--border-strong</span></div>
<div class="line"><span class="dot" style="background:#fff;border-color:var(--border-default)"></span><span class="t" style="color:var(--text-muted)">--border-default</span></div>
<div class="line"><span class="dot" style="background:#fff;border-color:var(--border-subtle)"></span><span class="t" style="color:var(--text-muted)">--border-subtle</span></div>
</div>
</div>
</body></html>
