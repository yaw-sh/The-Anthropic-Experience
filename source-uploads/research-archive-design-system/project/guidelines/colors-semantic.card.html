<!-- @dsCard group="Colors" viewport="700x160" name="Semantic · status & alert" subtitle="Emerald = verified/positive · Red = critical evidence" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.grid{display:flex;gap:12px}
.card{flex:1;border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;background:#fff}
.sw{height:56px}
.meta{padding:8px 10px;display:flex;justify-content:space-between;align-items:baseline}
.name{font:var(--fw-medium) 12px/1 var(--font-sans);color:var(--text-strong)}
.hex{font:var(--fw-regular) 11px/1 var(--font-mono);color:var(--text-faint)}
</style></head><body>
<div class="grid">
<div class="card"><div class="sw" style="background:var(--emerald-500)"></div><div class="meta"><span class="name">emerald-500</span><span class="hex">#10b981</span></div></div>
<div class="card"><div class="sw" style="background:var(--red-500)"></div><div class="meta"><span class="name">red-500</span><span class="hex">#ef4444</span></div></div>
<div class="card"><div class="sw" style="background:var(--red-900)"></div><div class="meta"><span class="name">red-900</span><span class="hex">#7f1d1d</span></div></div>
<div class="card"><div class="sw" style="background:var(--red-50)"></div><div class="meta"><span class="name">red-50</span><span class="hex">#fef2f2</span></div></div>
</div>
</body></html>
