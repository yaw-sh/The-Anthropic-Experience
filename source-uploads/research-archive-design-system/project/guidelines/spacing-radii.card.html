<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="sm 4 · md 6 · lg 8 · xl 12 · full — the Tailwind rounded scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;gap:20px;align-items:flex-end}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:72px;height:56px;background:#fff;border:1px solid var(--border-default);box-shadow:var(--shadow-xs)}
.lab{font:var(--fw-regular) 11px/1 var(--font-mono);color:var(--text-subtle)}
</style></head><body>
<div class="row">
<div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 4</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 6</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 8</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 12</span></div>
<div class="item"><div class="box" style="width:56px;border-radius:var(--radius-full)"></div><span class="lab">full</span></div>
</div>
</body></html>
