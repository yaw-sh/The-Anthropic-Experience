<!-- @dsCard group="Colors" viewport="700x150" name="Accent · blue (informational)" subtitle="The assistant / info accent — callouts, model chips" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-default)}
.sw{flex:1;height:64px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
.lab{font:var(--fw-medium) 10px/1 var(--font-mono)}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--blue-50)"><span class="lab" style="color:var(--blue-700)">50</span></div>
<div class="sw" style="background:var(--blue-100)"><span class="lab" style="color:var(--blue-700)">100</span></div>
<div class="sw" style="background:var(--blue-200)"><span class="lab" style="color:var(--blue-900)">200</span></div>
<div class="sw" style="background:var(--blue-400)"><span class="lab" style="color:#fff">400</span></div>
<div class="sw" style="background:var(--blue-500)"><span class="lab" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--blue-700)"><span class="lab" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--blue-900)"><span class="lab" style="color:#fff">900</span></div>
</div>
</body></html>
